<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>swagPlayer • Telegram App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: var(--tg-theme-bg-color, #0a0a0f); color: var(--tg-theme-text-color, #ffffff); font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .tg-button { background: var(--tg-theme-button-color, #6C63FF); color: var(--tg-theme-button-text-color, #ffffff); }
    </style>
</head>
<body>
    <div class="min-h-screen p-4">
        <div class="max-w-md mx-auto">
            <!-- Logo -->
            <div class="text-center py-8">
                <div class="text-6xl mb-3">🎵</div>
                <h1 class="text-2xl font-bold text-white">swagPlayer</h1>
                <p class="text-gray-400 text-sm">Your music, everywhere</p>
            </div>
            
            <!-- Auth Button -->
            <div id="authSection" class="bg-white/5 rounded-2xl p-6 border border-white/10">
                <button id="authBtn" class="w-full tg-button py-3 rounded-full font-semibold text-center">
                    <i class="fab fa-telegram mr-2"></i> Login with Telegram
                </button>
                <p class="text-center text-gray-500 text-xs mt-3">Securely login using your Telegram account</p>
            </div>
            
            <!-- Loading -->
            <div id="loadingSection" class="hidden text-center py-8">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-[#6C63FF] border-t-transparent"></div>
                <p class="text-gray-400 text-sm mt-3">Authenticating...</p>
            </div>
            
            <!-- User Section -->
            <div id="userSection" class="hidden">
                <div class="bg-white/5 rounded-2xl p-6 border border-white/10">
                    <div class="flex items-center gap-4">
                        <div id="userAvatar" class="w-16 h-16 rounded-full bg-gradient-to-br from-[#6C63FF] to-[#FF6B6B] flex items-center justify-center text-2xl font-bold text-white"></div>
                        <div>
                            <p id="userName" class="text-white font-semibold text-lg"></p>
                            <p id="userNick" class="text-gray-400 text-sm"></p>
                        </div>
                    </div>
                    <div class="mt-4 grid grid-cols-2 gap-2">
                        <a href="/" class="text-center py-3 bg-white/5 rounded-xl text-white text-sm hover:bg-white/10 transition">Library</a>
                        <a href="/rooms" class="text-center py-3 bg-white/5 rounded-xl text-white text-sm hover:bg-white/10 transition">Rooms</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const initData = '{{ init_data }}';
        const authBtn = document.getElementById('authBtn');
        const authSection = document.getElementById('authSection');
        const loadingSection = document.getElementById('loadingSection');
        const userSection = document.getElementById('userSection');
        
        // Check if already authenticated via initData
        if (initData) {
            authenticate(initData);
        }
        
        authBtn.addEventListener('click', function() {
            tg.openLink('https://t.me/swagplayerobot?start=auth');
        });
        
        function authenticate(initData) {
            authSection.classList.add('hidden');
            loadingSection.classList.remove('hidden');
            
            fetch('/api/auth/telegram', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initData: initData })
            })
            .then(r => r.json())
            .then(data => {
                loadingSection.classList.add('hidden');
                if (data.success) {
                    showUser(data.user);
                    tg.close();
                } else {
                    authSection.classList.remove('hidden');
                    alert('Authentication failed: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(() => {
                loadingSection.classList.add('hidden');
                authSection.classList.remove('hidden');
                alert('Network error. Please try again.');
            });
        }
        
        function showUser(user) {
            userSection.classList.remove('hidden');
            document.getElementById('userName').textContent = user.display_name || user.first_name;
            document.getElementById('userNick').textContent = '@' + (user.nickname || 'user');
            if (user.avatar_url) {
                document.getElementById('userAvatar').innerHTML = `<img src="${user.avatar_url}" class="w-full h-full rounded-full object-cover">`;
            } else {
                document.getElementById('userAvatar').textContent = (user.display_name || 'U')[0];
            }
            tg.MainButton.setText('Open Player');
            tg.MainButton.onClick(() => window.location.href = '/');
            tg.MainButton.show();
        }
    </script>
</body>
</html>
