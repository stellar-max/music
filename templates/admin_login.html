<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login • swagPlayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="min-h-screen bg-gradient-to-b from-[#0a0a0f] to-[#1a1a2e] flex items-center justify-center p-4">
    <div class="max-w-sm w-full bg-white/5 rounded-2xl p-6 border border-white/10">
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">🔐</div>
            <h1 class="text-2xl font-bold text-white">Admin Login</h1>
            <p class="text-gray-400 text-sm">Enter your credentials to access the admin panel</p>
        </div>
        <form id="adminLoginForm" class="space-y-4">
            <div>
                <label class="block text-gray-300 text-sm mb-1">Username</label>
                <input type="text" id="adminUsername" placeholder="admin" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#6C63FF] transition">
            </div>
            <div>
                <label class="block text-gray-300 text-sm mb-1">Password</label>
                <input type="password" id="adminPassword" placeholder="••••••••" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#6C63FF] transition">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-[#6C63FF] to-[#FF6B6B] text-white font-bold py-3 rounded-full hover:opacity-90 transition">
                Login
            </button>
        </form>
        <p class="text-center text-gray-500 text-xs mt-4">Default: admin / admin123</p>
    </div>
    
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            fetch('/admin/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/admin';
                } else {
                    alert('Invalid credentials!');
                }
            })
            .catch(() => alert('Error logging in'));
        });
    </script>
</body>
</html>
