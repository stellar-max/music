# docker-compose.yml - Works with Docker Compose

version: '3.8'

services:
  # Main web application
  web:
    build: .
    container_name: swagplayer-web
    ports:
      - "5024:5024"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - SECRET_KEY=${SECRET_KEY}
      - WEBAPP_URL=${WEBAPP_URL:-http://localhost:5024}
      - FLASK_DEBUG=false
      - DATABASE_URL=postgresql://swaguser:swagpass@db:5432/swagplayer
    volumes:
      - ./uploads:/app/uploads
      - ./static:/app/static
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - swag-network

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: swagplayer-db
    environment:
      - POSTGRES_USER=swaguser
      - POSTGRES_PASSWORD=swagpass
      - POSTGRES_DB=swagplayer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - swag-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: swagplayer-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - swag-network

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: swagplayer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - swag-network

volumes:
  postgres_data:

networks:
  swag-network:
    driver: bridge
